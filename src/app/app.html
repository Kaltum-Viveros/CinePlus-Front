<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" routerLink="/">
      <i class="bi bi-camera-reels me-2"></i>CinePlus
    </a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNav"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a
            class="nav-link"
            routerLink="/"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
          >
            <i class="bi bi-film me-1"></i>Cartelera
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/carrito" routerLinkActive="active">
            <i class="bi bi-cart3 me-1"></i>Carrito
            @if (cartCount() > 0) {
              <span class="badge bg-danger ms-1">{{ cartCount() }}</span>
            }
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contacto" routerLinkActive="active">
            <i class="bi bi-envelope me-1"></i>Contacto
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Content -->
<main>
  <router-outlet />
</main>

<!-- Footer -->
<footer class="bg-dark text-white text-center py-3 mt-5">
  <div class="container">
    <p class="mb-0">
      <i class="bi bi-camera-reels me-1"></i>
      &copy; 2026 CinePlus. Todos los derechos reservados.
    </p>
  </div>
</footer>
